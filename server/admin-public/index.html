<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Nexlify™ — Deterministic Command Center</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <!-- React & ReactDOM via CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --bg: #070709;
      --surface: #0f0f13;
      --surface-elevated: #16161c;
      --border: rgba(255, 255, 255, 0.08);
      --accent: #ff3b30;
      --accent-glow: rgba(255, 59, 48, 0.2);
      --accent-blue: #0084ff;
      --accent-blue-glow: rgba(0, 132, 255, 0.25);
      --success: #30d158;
      --success-glow: rgba(48, 209, 88, 0.2);
      --warm: #ff9f0a;
      --warm-glow: rgba(255, 159, 10, 0.2);
      --teal: #64d2ff;
      --text: #ffffff;
      --text-secondary: #8e8e93;
      --text-tertiary: #48484a;
      --radius: 16px;
      --radius-sm: 10px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      line-height: 1.5;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.2);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* Layout */
    .dashboard-container {
      max-width: 1500px;
      margin: 0 auto;
      padding: 24px;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding-bottom: 20px;
      margin-bottom: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-logo {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--accent), #ff9f0a);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 1.5rem;
      box-shadow: 0 0 20px rgba(255, 59, 48, 0.3);
    }

    .brand-title {
      font-weight: 900;
      font-size: 1.3rem;
      letter-spacing: -0.03em;
      text-transform: uppercase;
    }

    .brand-subtitle {
      font-size: 0.72rem;
      color: var(--text-secondary);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 700;
      margin-top: 2px;
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .user-badge {
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 8px 16px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--teal);
    }

    /* Navigation Tabs */
    .nav-tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .nav-tab {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 12px 24px;
      border-radius: 12px;
      color: var(--text-secondary);
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .nav-tab.active {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--accent-blue);
      color: #ffffff;
      box-shadow: 0 4px 15px rgba(0, 132, 255, 0.15);
    }

    /* Grid Layout */
    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 24px;
    }

    .col-3 { grid-column: span 3; }
    .col-4 { grid-column: span 4; }
    .col-5 { grid-column: span 5; }
    .col-6 { grid-column: span 6; }
    .col-7 { grid-column: span 7; }
    .col-8 { grid-column: span 8; }
    .col-12 { grid-column: span 12; }

    @media (max-width: 1024px) {
      .col-3, .col-4, .col-5, .col-6, .col-7, .col-8 { grid-column: span 12; }
    }

    /* Glass Panels */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .panel::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 14px;
    }

    .panel-title {
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      color: #ffffff;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Status Items */
    .status-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .status-dot.nominal {
      background-color: var(--success);
      box-shadow: 0 0 10px var(--success-glow);
    }

    .status-dot.degraded {
      background-color: var(--warm);
      box-shadow: 0 0 10px rgba(255, 159, 10, 0.4);
    }

    .status-dot.offline {
      background-color: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow);
    }

    /* Form Fields */
    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-secondary);
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      color: #ffffff;
      font-size: 0.85rem;
      outline: none;
      transition: all 0.2s;
    }

    .form-input:focus {
      border-color: var(--accent-blue);
      box-shadow: 0 0 10px rgba(0, 132, 255, 0.15);
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 20px;
      border-radius: var(--radius-sm);
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      width: 100%;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-blue {
      background: linear-gradient(135deg, var(--accent-blue), #00c6ff);
      color: #ffffff;
      box-shadow: 0 4px 15px var(--accent-blue-glow);
    }

    .btn-accent {
      background: linear-gradient(135deg, var(--accent), #ff9f0a);
      color: #ffffff;
      box-shadow: 0 4px 15px var(--accent-glow);
    }

    .btn-success {
      background: linear-gradient(135deg, var(--success), #00ffaa);
      color: #000000;
      box-shadow: 0 4px 15px var(--success-glow);
    }

    .btn-secondary {
      background: var(--surface-elevated);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    /* Terminal Console */
    .console-box {
      background: #040406;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: #30d158;
      line-height: 1.5;
      height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
    }

    .console-line {
      margin-bottom: 6px;
    }

    .console-prompt {
      color: rgba(255, 255, 255, 0.3);
      margin-right: 8px;
    }

    /* Table / Lists */
    .dealer-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      cursor: pointer;
      transition: background 0.15s;
    }

    .dealer-row:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    .dealer-row:last-child {
      border-bottom: none;
    }

    .dealer-name {
      font-weight: 700;
      font-size: 0.88rem;
    }

    .dealer-details {
      font-size: 0.72rem;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* Outbound Swarm elements */
    .prospect-card {
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 20px;
    }

    .prospect-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .prospect-title {
      font-size: 1.05rem;
      font-weight: 800;
      color: #ffffff;
    }

    .prospect-tag {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      background: rgba(100, 210, 255, 0.15);
      color: var(--teal);
    }

    .prospect-tag.fired {
      background: rgba(48, 209, 88, 0.15);
      color: var(--success);
    }

    .prospect-tag.redrafted {
      background: rgba(255, 159, 10, 0.15);
      color: var(--warm);
    }

    .prospect-meta {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-bottom: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .prospect-research {
      background: rgba(0, 0, 0, 0.3);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.76rem;
      color: var(--warm);
      line-height: 1.4;
      margin-bottom: 14px;
      border-left: 3px solid var(--warm);
    }

    .prospect-draft-box {
      background: #040406;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.74rem;
      color: #e5e5ea;
      white-space: pre-wrap;
      word-break: break-all;
      word-wrap: break-word;
      max-height: 250px;
      overflow-y: auto;
      margin-bottom: 14px;
      line-height: 1.5;
    }

    /* Agent Status Badge */
    .agent-status-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    @media (max-width: 900px) {
      .agent-status-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    @media (max-width: 500px) {
      .agent-status-grid {
        grid-template-columns: 1fr;
      }
    }

    .agent-status-card {
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }

    .agent-status-name {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .agent-status-pulse {
      font-size: 0.85rem;
      font-weight: 800;
      color: var(--success);
      margin-top: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    /* Proposal Card */
    .proposal-card {
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .proposal-card.approved {
      border-color: rgba(48, 209, 88, 0.3);
      background: linear-gradient(135deg, rgba(48, 209, 88, 0.02), var(--surface-elevated));
    }

    /* Legal Footer */
    .footer {
      text-align: center;
      margin-top: 50px;
      border-top: 1px solid var(--border);
      padding-top: 20px;
      padding-bottom: 40px;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    /* Responsive Utilities */
    .system-health-agents-grid {
      grid-template-columns: repeat(2, 1fr) !important;
    }
    @media (max-width: 768px) {
      .system-health-agents-grid {
        grid-template-columns: 1fr !important;
      }
      .dashboard-container {
        padding: 12px;
      }
      .panel {
        padding: 16px;
      }
      .grid {
        gap: 16px;
      }
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <!-- React GUI logic in JSX parsed via Babel stably inside container -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function App() {
      // General App State
      const [activeTab, setActiveTab] = useState('telemetry'); // telemetry OR warroom
      const [systemStatus, setSystemStatus] = useState({
        status: 'ONLINE',
        swarms_deployed: 0,
        logs: [],
        db: { status: 'SECURED', dealer_count: 0 }
      });
      const [dealers, setDealers] = useState([]);
      const [activeWorker, setActiveWorker] = useState(null);
      const [workerConsole, setWorkerConsole] = useState([]);
      const consoleEndRef = useRef(null);

      // Tab 1 (Telemetry) Forms
      const [formDealerName, setFormDealerName] = useState('Al Mansour Motors');
      const [formPhone, setFormPhone] = useState('971509876543');
      const [formWabaId, setFormWabaId] = useState('15822263653');
      const [formPhoneId, setFormPhoneId] = useState('971509876543');
      const [formToken, setFormToken] = useState('EAALeGlVYcVMBRXgxeEezbX');
      const [selectedDealerId, setSelectedDealerId] = useState('');
      const [markupPercent, setMarkupPercent] = useState('5');

      // Tab 2 (War Room) HITL States
      const [outboundQueue, setOutboundQueue] = useState([]);
      const [boardProposals, setBoardProposals] = useState([]);
      const [qaDefects, setQaDefects] = useState([]);

      // Load initial telemetry & dealers data
      const loadTelemetry = async () => {
        try {
          const res = await fetch('/api/telemetry');
          const data = await res.json();
          setSystemStatus(data.sentinel);
          setDealers(data.dealers);
          if (data.dealers.length > 0 && !selectedDealerId) {
            setSelectedDealerId(data.dealers[0].dealer_id);
          }
        } catch (e) {
          console.error('Failed to load telemetry:', e);
        }
      };

      // Load HITL Outbound Queue, Proposals, and QA Defects
      const loadWarRoomData = async () => {
        try {
          const [outboundRes, proposalsRes, qaRes] = await Promise.all([
            fetch('/api/outbound/queue'),
            fetch('/api/proposals'),
            fetch('/api/qa/defects')
          ]);
          const outboundData = await outboundRes.json();
          const proposalsData = await proposalsRes.json();
          const qaData = await qaRes.json();
          setOutboundQueue(outboundData.data);
          setBoardProposals(proposalsData.data);
          setQaDefects(qaData.data);
        } catch (e) {
          console.error('Failed to load War Room and QA data:', e);
        }
      };

      useEffect(() => {
        loadTelemetry();
        loadWarRoomData();
        const interval = setInterval(() => {
          loadTelemetry();
          loadWarRoomData();
        }, 5000);
        return () => clearInterval(interval);
      }, []);

      // Scroll console to bottom
      useEffect(() => {
        if (consoleEndRef.current) {
          consoleEndRef.current.scrollTop = consoleEndRef.current.scrollHeight;
        }
      }, [workerConsole]);

      const logToConsole = (msg) => {
        const timestamp = new Date().toLocaleTimeString();
        setWorkerConsole(prev => [...prev, `[${timestamp}] ${msg}`]);
      };

      // Trigger Worker A (Provisioner)
      const handleTriggerWorkerA = async () => {
        if (!formDealerName || !formPhone || !formWabaId || !formPhoneId || !formToken) {
          alert('Please fill in all Worker A configuration parameters!');
          return;
        }

        setActiveWorker('Worker A (Provisioner)');
        logToConsole(`⚡ Initializing Worker A (Provisioner)...`);
        
        try {
          const res = await fetch('/api/trigger-worker-a', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              dealerName: formDealerName,
              phone: formPhone,
              wabaId: formWabaId,
              phoneId: formPhoneId,
              token: formToken
            })
          });

          const data = await res.json();
          if (data.success) {
            logToConsole(`✅ Worker A Completed Successfully.`);
            data.logs.forEach(line => logToConsole(`[Worker Out] ${line}`));
          } else {
            logToConsole(`❌ Worker A Failed: ${data.error}`);
          }
          loadTelemetry();
        } catch (e) {
          logToConsole(`❌ Network/Server exception while running Worker A: ${e.message}`);
        } finally {
          setActiveWorker(null);
        }
      };

      // Trigger Worker B (Scraper)
      const handleTriggerWorkerB = async () => {
        if (!selectedDealerId) {
          alert('Please select a target Dealer profile!');
          return;
        }

        setActiveWorker('Worker B (Scraper)');
        logToConsole(`⚡ Dispatching Worker B (Scraper/Updater) for target: ${selectedDealerId}...`);

        try {
          const res = await fetch('/api/trigger-worker-b', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              dealerId: selectedDealerId,
              markupPercent: markupPercent
            })
          });

          const data = await res.json();
          if (data.success) {
            logToConsole(`✅ Worker B Pricing Update Completed Successfully.`);
            data.logs.forEach(line => logToConsole(`[Worker Out] ${line}`));
          } else {
            logToConsole(`❌ Worker B Failed: ${data.error}`);
          }
          loadTelemetry();
        } catch (e) {
          logToConsole(`❌ Network/Server exception while running Worker B: ${e.message}`);
        } finally {
          setActiveWorker(null);
        }
      };

      // HITL: Fire message
      const handleFireMessage = async (showroom) => {
        logToConsole(`🔥 Requesting HITL outbound approval for "${showroom}"...`);
        try {
          const res = await fetch('/api/outbound/fire', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ showroom })
          });
          const data = await res.json();
          if (data.success) {
            logToConsole(`✅ ${data.message}`);
            data.logs.forEach(l => logToConsole(l));
            loadWarRoomData();
          } else {
            logToConsole(`❌ Outbound dispatch failed: ${data.error}`);
          }
        } catch (e) {
          logToConsole(`❌ Error firing outbound: ${e.message}`);
        }
      };

      // HITL: Re-draft message
      const handleRedraftMessage = async (showroom) => {
        logToConsole(`✍️ Triggering SDR Copy re-draft variation for "${showroom}"...`);
        try {
          const res = await fetch('/api/outbound/redraft', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ showroom })
          });
          const data = await res.json();
          if (data.success) {
            logToConsole(`✅ ${data.message}`);
            loadWarRoomData();
          } else {
            logToConsole(`❌ Re-draft failed: ${data.error}`);
          }
        } catch (e) {
          logToConsole(`❌ Error re-drafting outbound: ${e.message}`);
        }
      };

      // HITL: Approve Advisory Board Proposal
      const handleApproveProposal = async (id, title) => {
        logToConsole(`✅ CEO Trigger: Approving and merging "${title}" into active code configurations...`);
        try {
          const res = await fetch('/api/proposals/approve', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id })
          });
          const data = await res.json();
          if (data.success) {
            logToConsole(`✅ ${data.message}`);
            loadWarRoomData();
          } else {
            logToConsole(`❌ Proposal approval failed: ${data.error}`);
          }
        } catch (e) {
          logToConsole(`❌ Error approving proposal: ${e.message}`);
        }
      };

      // HITL: Enforce Absolute Override (QA Syndicate)
      const handleEnforceOverride = async (id, target) => {
        logToConsole(`🛡️ CEO Override Triggered: Executing absolute QA override on failed code module "${target}"...`);
        try {
          const res = await fetch('/api/qa/defects/enforce', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id })
          });
          const data = await res.json();
          if (data.success) {
            logToConsole(`🛡️ SUCCESS: ${data.message}`);
            loadWarRoomData();
          } else {
            logToConsole(`❌ QA Override failed: ${data.error}`);
          }
        } catch (e) {
          logToConsole(`❌ Error enforcing QA override: ${e.message}`);
        }
      };

      return (
        <div className="dashboard-container">
          {/* Header */}
          <div className="header">
            <div className="brand">
              <div className="brand-logo">⚡</div>
              <div>
                <h1 className="brand-title">Ai Nexlify™ OS</h1>
                <div className="brand-subtitle">DETERMINISTIC COMMAND CENTER</div>
              </div>
            </div>
            <div className="header-meta">
              <span className="user-badge">🔒 SYSTEM ROOT: ANAS WAHAB</span>
            </div>
          </div>

          {/* Navigation Tabs */}
          <div className="nav-tabs">
