<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Audit | AI Nexlify Agencies</title>
    <!-- Premium Plush Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-deep: #030303;
            --bg-surface: #0a0a0a;
            --text-white: #ffffff;
            --text-muted: #a1a1aa;
            --gold-light: #f5d061;
            --gold: #c49f3b;
            --gold-dark: #8c6e23;
            --emerald: #6ee7b7; /* Emerald-300 */
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            
            --font-body: 'Plus Jakarta Sans', sans-serif;
            --font-heading: 'Outfit', sans-serif;
            
            --transition-smooth: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-deep);
            color: var(--text-white);
            font-family: var(--font-body);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .ambient-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: -1;
            background: 
                radial-gradient(circle at 15% 50%, rgba(196, 159, 59, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(110, 231, 183, 0.03), transparent 25%);
            filter: blur(80px);
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 6rem 1.5rem; width: 100%; text-align: center; }

        /* Nav back */
        .nav-back { position: absolute; top: 2rem; left: 2rem; color: var(--text-muted); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; transition: var(--transition-smooth); }
        .nav-back:hover { color: var(--emerald); }

        /* Header */
        header { text-align: center; margin-bottom: 3rem; }
        .hero-badge {
            display: inline-block; background: rgba(110, 231, 183, 0.1); border: 1px solid var(--emerald);
            color: var(--emerald); padding: 0.5rem 1.25rem; border-radius: 100px; font-size: 0.85rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1.5rem; box-shadow: 0 0 20px rgba(110, 231, 183, 0.2);
        }
        h1 { font-family: var(--font-heading); font-size: clamp(2.5rem, 5vw, 4rem); line-height: 1.1; margin-bottom: 1.5rem; }
        .gradient-text {
            background: linear-gradient(135deg, var(--emerald), #34d399, #10b981);
            -webkit-background-clip: text; background-clip: text; color: transparent;
        }
        .subtitle { color: var(--text-muted); max-width: 800px; margin: 0 auto; font-size: 1.15rem; line-height: 1.6; }

        .glass-room {
            background: #000000;
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);
            padding: 4rem 2rem;
            position: relative;
        }
    </style>
<link rel="stylesheet" href="omega.css">
</head>
<body>
    <div class="ambient-bg"></div>
    <a href="index.html" class="nav-back"><i data-lucide="arrow-left"></i> Back to Home</a>

    <div class="container">
        <header>
            <div class="hero-badge">Architecture Consultation</div>
            <h1 class="gradient-text">Book Your Strategy Call</h1>
            <p class="subtitle">We will review your current intake flow, identify exactly where your leads are bleeding out, and map the architecture for a custom Layla deployment.</p>
        </header>

        <div class="glass-room">
            <!-- Zoho Bookings Calendar Injection -->
            <div class="calendar-container" style="width: 100%; height: 750px; border-radius: 12px; overflow: hidden; background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border);">
                <!-- Replace the src below with your actual Zoho Bookings URL -->
                <iframe 
                    src="https://ainexlify.zohobookings.in/portal-embed#/ainexlify" 
                    id="zoho-calendar-frame"
                    style="width: 100%; height: 100%; border: none;" 
                    allowfullscreen>
                </iframe>
                <div id="calendar-loading" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; text-align: center;">
                    <i data-lucide="loader-2" style="width: 32px; height: 32px; color: var(--emerald); animation: spin 2s linear infinite; margin-bottom: 1rem;"></i>
                    <p style="color: var(--text-muted); font-size: 0.9rem;">Initializing Secure Architecture Protocol...</p>
                </div>
            </div>

            <style>
                @keyframes spin { 100% { transform: rotate(360deg); } }
                /* Hide loader once iframe loads */
                iframe:not([src="about:blank"]) + #calendar-loading {
                    display: none;
                }
            </style>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
