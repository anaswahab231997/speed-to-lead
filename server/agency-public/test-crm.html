<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexlify — CRM Command Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card: rgba(20, 20, 25, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #00f2ff;
            --accent-pink: #ff00f2;
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 242, 255, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 0, 242, 0.03) 0%, transparent 40%);
            min-height: 100vh;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 50px; 
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .logo { font-weight: 800; font-size: 1.5rem; letter-spacing: -1px; }
        .logo span { color: var(--accent); }

        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; 
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
        }

        .stat-card h3 { font-size: 0.8rem; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
        .stat-card p { font-size: 2rem; font-weight: 800; }

        .main-layout { display: grid; grid-template-columns: 1fr 350px; gap: 30px; }

        .section-title { font-weight: 800; margin-bottom: 24px; display: flex; align-items: center; gap: 10px; }
        .section-title .pulse { 
            width: 8px; height: 8px; background: var(--accent); border-radius: 50%; 
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 242, 255, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(0, 242, 255, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 242, 255, 0); }
        }

        .lead-list { display: flex; flex-direction: column; gap: 15px; }

        .lead-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 16px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .lead-card:hover { border-color: rgba(255, 255, 255, 0.2); transform: translateY(-2px); }
        .lead-card.hot { border-left: 4px solid var(--accent-pink); }

        .lead-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .lead-name { font-weight: 600; font-size: 1.1rem; }
        .lead-score { background: rgba(0, 242, 255, 0.1); color: var(--accent); padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 800; }

        .lead-body { font-size: 0.9rem; color: var(--text-dim); line-height: 1.5; }
        .lead-footer { margin-top: 15px; display: flex; gap: 10px; font-size: 0.75rem; text-transform: uppercase; font-weight: 600; }

        .status-badge { padding: 4px 8px; border-radius: 4px; background: rgba(255, 255, 255, 0.05); }

        .task-panel { 
            position: sticky; 
            top: 20px; 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 20px; 
            padding: 24px; 
            backdrop-filter: blur(20px);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-family: inherit;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(0, 242, 255, 0.4); }
        
        .btn-secondary { background: rgba(255, 255, 255, 0.05); color: #fff; border: 1px solid var(--border); }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.1); }

        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 10px;
            color: #fff;
            margin-bottom: 20px;
            font-family: inherit;
        }

        label { display: block; font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; font-weight: 600; }

        #toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--accent);
            color: #000;
            padding: 15px 25px;
            border-radius: 12px;
            font-weight: 800;
            transform: translateY(100px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }
        #toast.show { transform: translateY(0); }

        @media (max-width: 900px) {
            .main-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">NEXLIFY <span>CRM</span></div>
            <div id="connection-status" style="font-size: 0.8rem; color: var(--accent)">
                <span class="pulse"></span> LIVE SYNC ACTIVE
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Leads</h3>
                <p id="stat-total">0</p>
            </div>
            <div class="stat-card">
                <h3>Hot Prospects</h3>
                <p id="stat-hot" style="color: var(--accent-pink)">0</p>
            </div>
            <div class="stat-card">
                <h3>Inventory</h3>
                <p id="stat-cars">0</p>
            </div>
            <div class="stat-card">
                <h3>Response Speed</h3>
                <p style="color: var(--accent)">4.0s</p>
            </div>
        </div>

        <div class="main-layout">
            <section>
                <h2 class="section-title"><span class="pulse"></span> Active Lead Feed</h2>
                <div id="lead-list" class="lead-list">
                    <div style="text-align: center; padding: 40px; color: var(--text-dim)">Fetching leads...</div>
                </div>
            </section>

            <aside>
                <div class="task-panel">
                    <h2 class="section-title">Deployment Hub</h2>
                    
                    <label>Quick Lead Test</label>
                    <input type="text" id="test-phone" placeholder="+971 50 000 0000">
                    <button class="btn btn-primary" onclick="deployLayla()">Deploy Layla ⚡</button>
                    
                    <div style="margin: 25px 0; height: 1px; background: var(--border)"></div>
                    
                    <label>NEX-02 Recon Swarm</label>
                    <input type="text" id="recon-url" placeholder="www.dealership.ae">
                    <button class="btn btn-secondary" onclick="dispatchRecon()">Dispatch Swarm 🕵️</button>
                    
                    <button class="btn btn-secondary" style="margin-top: 20px" onclick="fetchData()">Refresh CRM 🔄</button>
                </div>
            </aside>
        </div>
    </div>

    <div id="toast">Task Dispatched Successfully</div>

    <script>
        async function fetchData() {
            try {
                const [leadsRes, statsRes] = await Promise.all([
                    fetch('/api/leads'),
                    fetch('/api/stats')
                ]);

                const leadsData = await leadsRes.json();
                const statsData = await statsRes.json();

                document.getElementById('stat-total').innerText = statsData.data.totalLeads;
                document.getElementById('stat-hot').innerText = statsData.data.hotLeads;
                document.getElementById('stat-cars').innerText = statsData.data.availableCars;

                const list = document.getElementById('lead-list');
                list.innerHTML = '';

                if (leadsData.data.length === 0) {
                    list.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--text-dim)">No leads in system memory.</div>';
                    return;
                }

                leadsData.data.forEach(lead => {
                    const card = document.createElement('div');
                    card.className = `lead-card ${lead.intentScore >= 8 ? 'hot' : ''}`;
                    const time = lead.lastActivity ? new Date(lead.lastActivity).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '--:--';
                    
                    card.innerHTML = `
                        <div class="lead-header">
                            <span class="lead-name">${lead.name || 'Anonymous'}</span>
                            <span class="lead-score">${lead.intentScore || 0}/10</span>
                        </div>
                        <div class="lead-body">${lead.lastMessage || 'Contact established.'}</div>
                        <div class="lead-footer">
                            <span class="status-badge">${lead.status || 'NEW'}</span>
                            <span class="status-badge">${lead.phone}</span>
                            <span style="margin-left: auto">${time}</span>
                        </div>
                    `;
                    list.appendChild(card);
                });
            } catch (err) {}
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        async function deployLayla() {
            const phone = document.getElementById('test-phone').value;
            if (!phone) return;
            showToast('Syncing with Layla...');
            // Hit audit endpoint to simulate a lead trigger
            await fetch('/api/agency/audit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: 'test.com', name: 'Manual Test', phone, email: 'test@nexlify.com' })
            });
            showToast('Layla Dispatched ⚡');
            setTimeout(fetchData, 1000);
        }

        async function dispatchRecon() {
            const url = document.getElementById('recon-url').value;
            if (!url) return;
            showToast('NEX-02 Swarm Dispatched...');
            await fetch('/api/agency/audit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url, name: 'Prospect', phone: '+971000000', email: 'recon@nexlify.com' })
            });
            showToast('Recon Active 🕵️');
            setTimeout(fetchData, 1000);
        }

        setInterval(fetchData, 5000);
        fetchData();
    </script>
</body>
</html>
